# Fly.io deployment config for AI Swing Trader
app = "ai-swing-trader"
primary_region = "ord"   # Chicago — closest to US markets

[build]
  dockerfile = "Dockerfile"

[env]
  STARTING_CASH = "10000"

[mounts]
  source = "trading_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # never sleep
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
